<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .player {
      position: relative;
      width: 100vw;
      max-width: 900px;
      background: #000;
      cursor: pointer;
      user-select: none;
    }
    .thumbnail {
      width: 100%;
      aspect-ratio: 16/9;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    /* Play button */
    .play-btn {
      position: absolute;
      width: 72px;
      height: 72px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      border: 2px solid rgba(255,255,255,0.3);
      transition: transform 0.2s, background 0.2s;
      z-index: 5;
    }
    .play-btn:hover {
      background: rgba(255,255,255,0.25);
      transform: scale(1.1);
    }
    .play-btn svg { margin-left: 6px; }

    /* Controls bar */
    .controls {
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
      padding: 8px 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    /* Progress bar */
    .progress-bar {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.3);
      border-radius: 2px;
      position: relative;
    }
    .progress-fill {
      width: 0%;
      height: 100%;
      background: #ff0000;
      border-radius: 2px;
    }
    .progress-dot {
      position: absolute;
      top: 50%;
      left: 0%;
      transform: translate(-50%, -50%);
      width: 12px;
      height: 12px;
      background: #ff0000;
      border-radius: 50%;
    }
    /* Bottom controls */
    .bottom-controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .ctrl-btn {
      color: #fff;
      display: flex;
      align-items: center;
    }
    .time {
      color: #fff;
      font-size: 13px;
      font-family: Arial, sans-serif;
      letter-spacing: 0.5px;
    }
    .spacer { flex: 1; }
    .vol-icon, .fullscreen-icon {
      color: #fff;
    }
  </style>
</head>
<body>

<div class="player" onclick="triggerPPC()">
  <!-- Thumbnail -->
  <div class="thumbnail">
    <!-- Ganti link gambar di bawah ini -->
    <img src="LINK_GAMBAR_DISINI" onerror="this.style.display='none'" alt="">
    <div class="play-btn">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="white">
        <polygon points="5,3 19,12 5,21"/>
      </svg>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <!-- Progress bar -->
    <div class="progress-bar">
      <div class="progress-fill"></div>
      <div class="progress-dot"></div>
    </div>
    <!-- Bottom -->
    <div class="bottom-controls">
      <!-- Play icon -->
      <div class="ctrl-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
          <polygon points="5,3 19,12 5,21"/>
        </svg>
      </div>
      <!-- Volume -->
      <div class="ctrl-btn vol-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
          <polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/>
          <path d="M15.54,8.46a5,5,0,0,1,0,7.07" stroke="white" stroke-width="2" fill="none"/>
          <path d="M19.07,4.93a10,10,0,0,1,0,14.14" stroke="white" stroke-width="2" fill="none"/>
        </svg>
      </div>
      <!-- Time - GANTI DURASI DI SINI -->
      <div class="time">0:00 / 08:24</div>
      <div class="spacer"></div>
      <!-- Fullscreen -->
      <div class="ctrl-btn fullscreen-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
          <polyline points="15,3 21,3 21,9"/>
          <polyline points="9,21 3,21 3,15"/>
          <line x1="21" y1="3" x2="14" y2="10"/>
          <line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </div>
    </div>
  </div>
</div>

<script>
  let triggered = false;
  function triggerPPC() {
    if (!triggered) {
      triggered = true;
      // Ganti link PPC di bawah ini
      window.location.href = 'https://ibb.co.com/nMsSTN4q';
    }
  }
</script>

</body>
</html>
